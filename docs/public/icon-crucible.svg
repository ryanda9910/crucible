<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="molten128" x1="64" y1="48" x2="64" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="cup128" x1="40" y1="44" x2="88" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <radialGradient id="glow128" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom128">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#0A0A0B"/>

  <!-- Glow -->
  <ellipse cx="64" cy="64" rx="36" ry="30" fill="url(#glow128)"/>

  <!-- Crucible body -->
  <path d="M 42 44 L 86 44 L 78 94 L 50 94 Z" fill="url(#cup128)" stroke="#333" stroke-width="1.5"/>

  <!-- Rim -->
  <rect x="39" y="40" width="50" height="10" rx="3" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Molten fill -->
  <path d="M 45 54 L 83 54 L 76 88 L 52 88 Z" fill="url(#molten128)" opacity="0.9"/>

  <!-- Molten surface -->
  <ellipse cx="64" cy="56" rx="18" ry="4" fill="#fcd34d" opacity="0.6"/>
  <ellipse cx="64" cy="56" rx="11" ry="2.5" fill="#fef3c7" opacity="0.4"/>

  <!-- Sparks -->
  <circle cx="58" cy="32" r="3"   fill="#fbbf24" filter="url(#bloom128)" opacity="0.95"/>
  <circle cx="68" cy="26" r="2"   fill="#f97316" filter="url(#bloom128)" opacity="0.9"/>
  <circle cx="72" cy="34" r="1.5" fill="#fbbf24" opacity="0.75"/>
  <line x1="58" y1="32" x2="56" y2="22" stroke="#fbbf24" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="68" y1="26" x2="70" y2="16" stroke="#f97316" stroke-width="1" stroke-linecap="round" opacity="0.35"/>

  <!-- Handles -->
  <path d="M 39 50 Q 28 50 28 58 Q 28 66 39 66" stroke="#333" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 89 50 Q 100 50 100 58 Q 100 66 89 66" stroke="#333" stroke-width="5" fill="none" stroke-linecap="round"/>
</svg>
